name: Build and check

# PR-only: pushes to main are already built and deployed by deploy.yml, so
# running the same build again here would just be a redundant second job.
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
